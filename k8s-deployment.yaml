apiVersion: apps/v1
kind: Deployment
metadata:
  name: kuber-test
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kuber-test
  template:
    metadata:
      labels:
        app: kuber-test
    spec:
      containers:
        - name: html-container
          image: princeekr/kuber-test
          imagePullPolicy: IfNotPresent
          ports:
          - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: html-service
spec:
  type: NodePort
  selector:
    app: kuber-test
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30007